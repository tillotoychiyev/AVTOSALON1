{% extends 'base.html' %}


{% block main %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token%}

    {{ form.as_p}}

    <button style="color:green; ">
        {% if '/update/' in request.path %}
            Update
        {% else %}
           Save
        {% endif %}
    </button>
</form>

{% endblock main %}
