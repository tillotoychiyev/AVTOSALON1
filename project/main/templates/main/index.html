{% extends 'base.html' %}

{% block main %}
<div class="row mt-5">

    <!-- CATEGORY -->
    <div class="col-md-3">
        <div class="list-group">
            {% for category in categories %}
            <a href="{% url 'car_by_category' category.pk %}" class="list-group-item list-group-item-action">
                {{ category }}
            </a>
            {% endfor %}
        </div>
    </div>

    <!-- CARS -->
    <div class="col-md-9 ps-4">
        <div class="row row-cols-1 row-cols-md-3 g-4">

            {% for car in cars %}
            <div class="col">
                <div class="card h-100">

                    {% if car.image %}
                    <img src="{{ car.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                    {% else %}
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQeDNFn5ROMMcTOcZNALEfzbycEKZeYjNI4_A&s" class="card-img-top">
                    {% endif %}

                    <div class="card-body">
                        <h5>{{ car.name }}</h5>
                        <p>{{ car.text|truncatewords:10 }}</p>
                    </div>

                    <div class="card-body">
                        <a href="{% url 'detail' car.pk %}" class="btn btn-info">Batafsil</a>
                    </div>

                    <div class="card-footer">
                        <small>{{ car.updated }}</small>
                    </div>

                </div>
            </div>
            {% endfor %}

        </div>
    </div>

</div>
{% endblock main %}
